<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Banking Assistant</title>
<script src="/static/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1420; --panel:#1a2130; --panel-2:#222b3d; --accent:#4f8cff;
    --accent-soft:#2a3550; --text:#e8edf5; --muted:#8a97ad; --user:#4f8cff; --bot:#222b3d;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { width:100%; max-width:760px; padding:20px 16px 8px; display:flex; align-items:center; gap:12px; }
  .logo { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--accent),#7b5cff);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; }
  header h1 { font-size:18px; margin:0; }
  header p { font-size:12px; color:var(--muted); margin:2px 0 0; }
  #chat { width:100%; max-width:760px; flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px;
    scrollbar-width:thin; scrollbar-color:var(--accent-soft) transparent; }
  #chat::-webkit-scrollbar { width:8px; }
  #chat::-webkit-scrollbar-track { background:transparent; }
  #chat::-webkit-scrollbar-thumb { background:var(--accent-soft); border-radius:8px; }
  #chat::-webkit-scrollbar-thumb:hover { background:var(--muted); }
  .msg { max-width:82%; padding:12px 15px; border-radius:16px; line-height:1.5; font-size:15px; white-space:pre-wrap; }
  .user { align-self:flex-end; background:var(--user); border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:var(--bot); border-bottom-left-radius:4px; max-width:88%; }
  .sources { margin-top:10px; font-size:13px; }
  .sources summary { cursor:pointer; color:var(--muted); user-select:none; }
  .source-item { margin-top:8px; padding:8px 10px; background:var(--panel); border-left:3px solid var(--accent); border-radius:0; color:var(--muted); }
  .source-item b { color:var(--text); display:block; margin-bottom:3px; font-size:12px; }
  .typing { color:var(--muted); font-style:italic; }
  .chart-btn { margin-top:10px; padding:6px 12px; border:1px solid var(--accent-soft); background:var(--panel);
    color:var(--accent); border-radius:8px; font-size:13px; cursor:pointer; }
  .chart-btn:hover { background:var(--accent-soft); }
  .chart-box { margin-top:12px; background:var(--panel); border-radius:12px; padding:12px; max-width:440px; }
  .chart-box canvas { max-height:280px; }
  form { width:100%; max-width:760px; padding:12px 16px 20px; display:flex; gap:10px; }
  input { flex:1; padding:13px 16px; border-radius:12px; border:1px solid var(--accent-soft);
    background:var(--panel); color:var(--text); font-size:15px; outline:none; }
  input:focus { border-color:var(--accent); }
  button.send { padding:0 20px; border:none; border-radius:12px; background:var(--accent); color:white; font-weight:600; font-size:15px; cursor:pointer; }
  button.send:disabled { opacity:0.5; cursor:default; }
  .hint { color:var(--muted); font-size:13px; align-self:center; margin:auto 0; text-align:center; padding:20px; }
</style>
</head>
<body>
  <header>
    <div class="logo">B</div>
    <div>
      <h1>Banking Assistant</h1>
      <p>Ask about SEPA, IBAN, accounts — or client spending data</p>
    </div>
  </header>

  <div id="chat">
    <div class="hint">Try: "How long does a SEPA transfer take?" - "how much does C0001 spend on Lebensmittel" - "show me a chart of total spending by category"</div>
  </div>

  <form id="form">
    <input id="input" placeholder="Type your question..." autocomplete="off" />
    <button id="send" class="send" type="submit">Send</button>
  </form>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  let chartSeq = 0;

  const PALETTE = ["#4f8cff","#7b5cff","#4fd1c5","#f6ad55","#fc8181","#68d391","#f687b3","#a0aec0"];

  function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addSources(container, sources) {
    if (!sources || !sources.length) return;
    const details = document.createElement("details");
    details.className = "sources";
    const summary = document.createElement("summary");
    summary.textContent = sources.length + " source" + (sources.length>1?"s":"");
    details.appendChild(summary);
    sources.forEach(s => {
      const item = document.createElement("div");
      item.className = "source-item";
      const b = document.createElement("b");
      b.textContent = s.title || s.chunk_id;
      item.appendChild(b);
      item.appendChild(document.createTextNode(s.text));
      details.appendChild(item);
    });
    container.appendChild(details);
    chat.scrollTop = chat.scrollHeight;
  }

  function drawChart(container, chart) {
    const box = document.createElement("div");
    box.className = "chart-box";
    const holder = document.createElement("div");
    holder.style.position = "relative";
    holder.style.height = "260px";
    const canvas = document.createElement("canvas");
    canvas.id = "chart" + (chartSeq++);
    holder.appendChild(canvas);
    box.appendChild(holder);
    container.appendChild(box);
    chat.scrollTop = chat.scrollHeight;

    const isPie = chart.type === "doughnut" || chart.type === "pie";
    new Chart(canvas.getContext("2d"), {
      type: chart.type,
      data: {
        labels: chart.labels,
        datasets: [{
          label: chart.title,
          data: chart.values,
          backgroundColor: PALETTE,
          borderRadius: isPie ? 0 : 6,
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: isPie, labels: { color: "#e8edf5", font: { size: 11 } } },
          title: { display: true, text: chart.title, color: "#e8edf5", font: { size: 13 } },
        },
        scales: isPie ? {} : {
          x: { ticks: { color: "#8a97ad", maxRotation: 45, minRotation: 45 }, grid: { display: false } },
          y: { ticks: { color: "#8a97ad" }, grid: { color: "#232b3d" } },
        },
      },
    });
  }

  function addChartAffordance(container, chart, wantsChart) {
    if (!chart) return;
    if (wantsChart) {
      drawChart(container, chart);
      return;
    }
    const btn = document.createElement("button");
    btn.className = "chart-btn";
    btn.textContent = "Show chart";
    btn.onclick = () => { btn.remove(); drawChart(container, chart); };
    container.appendChild(btn);
    chat.scrollTop = chat.scrollHeight;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    const hint = chat.querySelector(".hint");
    if (hint) hint.remove();

    addMsg(q, "user");
    input.value = "";
    send.disabled = true;

    const typing = addMsg("Thinking...", "bot");
    typing.classList.add("typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: q }),
      });
      const data = await res.json();
      typing.classList.remove("typing");
      typing.textContent = data.answer;
      if (data.kind === "text") {
        addSources(typing, data.sources);
      } else if (data.kind === "data") {
        addChartAffordance(typing, data.chart, data.wants_chart);
      }
    } catch (err) {
      typing.classList.remove("typing");
      typing.textContent = "Sorry, something went wrong. Is the server running?";
    } finally {
      send.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
